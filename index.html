<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Best Friend Proposal</title>
    <style>
        body {
            background: linear-gradient(45deg, #ff6fb6, #ff6b6b);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        .card {
            width: 300px;
            margin: 100px auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
            padding: 20px;
            animation: fadeIn 1s;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .no-button {
            position: fixed;
            width: 100px;
            height: 50px;
            background-color: #ff6b3f;
            border: none;
            color: white;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.5s ease;
        }
        .no-button:hover {
            animation: escape 0.5s forwards;
        }
        @keyframes escape {
            position: fixed;
            top: calc(100vh * Math.random());
            left: calc(100vw * Math.random());
        }
        .confetti {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }
        .heart {
            position: absolute;
            width: 20px;
            height: 20px;
            background: red;
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            animation: float 3s infinite ease-in-out;
        }
        @keyframes float {
            0% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Will You Be My Best Friend?</h1>
        <button class="no-button">No</button>
    </div>
    <script>
        function createConfetti() {
            const confetti = document.createElement('div');
            confetti.classList.add('confetti');
            document.body.appendChild(confetti);
            // Add logic to create and animate confetti
        }
        createConfetti();

        // Create floating hearts
        for (let i = 0; i < 20; i++) {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = Math.random() * 100 + 'vh';
            document.body.appendChild(heart);
        }
        
    </script>
</body>
</html>

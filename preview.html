<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bestfriend Proposal 💖</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }

    body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        overflow: hidden;
    }

    .container {
        background: white;
        padding: 30px;
        border-radius: 20px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        width: 90%;
        max-width: 400px;
        position: relative;
    }

    h1 {
        color: #ff4d6d;
        margin-bottom: 20px;
        font-size: 26px;
    }

    .buttons {
        margin-top: 20px;
        position: relative;
        height: 100px;
    }

    button {
        padding: 10px 20px;
        border: none;
        border-radius: 30px;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
        position: absolute;
    }

    #yesBtn {
        background: #ff4d6d;
        color: white;
        left: 30%;
    }

    #yesBtn:hover {
        background: #ff1e4d;
        transform: scale(1.1);
    }

    #noBtn {
        background: #ccc;
        color: black;
        left: 60%;
    }

    .hidden {
        display: none;
    }

    .love-message {
        font-size: 22px;
        color: #ff4d6d;
        margin-top: 20px;
        animation: fadeIn 1s ease forwards;
    }

    @keyframes fadeIn {
        from {opacity: 0; transform: translateY(20px);}
        to {opacity: 1; transform: translateY(0);}
    }

    /* Floating hearts */
    .heart {
        position: fixed;
        bottom: 0;
        font-size: 20px;
        animation: floatUp 4s linear infinite;
        color: red;
    }

    @keyframes floatUp {
        0% {transform: translateY(0) scale(1);}
        100% {transform: translateY(-100vh) scale(1.5);}
    }

    .reset {
        margin-top: 20px;
        background: #6c5ce7;
        color: white;
        padding: 8px 15px;
        border-radius: 20px;
    }

    /* Mobile */
    @media (max-width: 500px) {
        h1 {
            font-size: 22px;
        }
    }
</style>
</head>

<body>

<div class="container">
    <h1 id="question">Will you be my best friend forever? 💖</h1>

    <div class="buttons" id="buttons">
        <button id="yesBtn">Yes 💕</button>
        <button id="noBtn">No 😜</button>
    </div>

    <div id="result" class="hidden">
        <p class="love-message">Yayyy! I love you bestie ❤️🥹</p>
        <button class="reset" onclick="resetPage()">Try Again</button>
    </div>
</div>

<script>
    const noBtn = document.getElementById("noBtn");
    const yesBtn = document.getElementById("yesBtn");
    const buttonsDiv = document.getElementById("buttons");
    const resultDiv = document.getElementById("result");

    // Move "No" button randomly
    noBtn.addEventListener("mouseover", moveButton);
    noBtn.addEventListener("click", moveButton);

    function moveButton() {
        const x = Math.random() * 250;
        const y = Math.random() * 80;

        noBtn.style.left = x + "px";
        noBtn.style.top = y + "px";
    }

    // Yes button action
    yesBtn.addEventListener("click", () => {
        buttonsDiv.classList.add("hidden");
        resultDiv.classList.remove("hidden");
        startHearts();
    });

    // Floating hearts effect
    function startHearts() {
        setInterval(() => {
            const heart = document.createElement("div");
            heart.classList.add("heart");
            heart.innerHTML = "❤️";

            heart.style.left = Math.random() * 100 + "vw";
            heart.style.fontSize = (Math.random() * 20 + 10) + "px";

            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 4000);
        }, 300);
    }

    function resetPage() {
        location.reload();
    }
</script>

</body>
</html>
